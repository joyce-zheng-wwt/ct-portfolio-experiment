<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CT Portfolio — Experiments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #050507;
  --off-white: #f0ede6;
  --acid: #c8f53d;
  --muted: #3a3a3f;
  --mid: #7a7a80;
  --border: rgba(240,237,230,0.09);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
body {
  background: var(--black);
  color: var(--off-white);
  font-family: var(--font-display);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
}
header { text-align: center; margin-bottom: 72px; }
.logo {
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.logo span { color: var(--acid); }
.subtitle {
  font-family: var(--font-mono);
  font-size: .68rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--mid);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 2px;
  width: 100%;
  max-width: 900px;
}
.experiment {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 32px 28px;
  background: #0c0c0f;
  border: 1px solid var(--border);
  text-decoration: none;
  color: var(--off-white);
  transition: background .25s, border-color .25s;
  min-height: 160px;
}
.experiment:hover {
  background: #101014;
  border-color: rgba(200,245,61,.2);
}
.experiment-num {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .16em;
  color: var(--acid);
  margin-bottom: 16px;
}
.experiment-name {
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: .02em;
  margin-bottom: 8px;
}
.experiment-desc {
  font-family: var(--font-mono);
  font-size: .63rem;
  line-height: 1.6;
  color: var(--mid);
}
.experiment-arrow {
  align-self: flex-end;
  font-size: .9rem;
  color: var(--muted);
  transition: transform .2s, color .2s;
}
.experiment:hover .experiment-arrow {
  transform: translate(3px, -3px);
  color: var(--acid);
}
footer {
  margin-top: 64px;
  font-family: var(--font-mono);
  font-size: .58rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
</style>
</head>
<body>

<header>
  <p class="logo">CT<span> /</span> Portfolio</p>
  <p class="subtitle">// Design experiments</p>
</header>

<div class="grid">
  <a href="./1/" class="experiment">
    <div>
      <p class="experiment-num">01</p>
      <p class="experiment-name">Strand Studio</p>
      <p class="experiment-desc">Creative technology agency concept with interactive DNA helix.</p>
    </div>
    <span class="experiment-arrow">↗</span>
  </a>
  <!-- Add future experiments here, e.g.:
  <a href="./2/" class="experiment">
    <div>
      <p class="experiment-num">02</p>
      <p class="experiment-name">Next Experiment</p>
      <p class="experiment-desc">Description here.</p>
    </div>
    <span class="experiment-arrow">↗</span>
  </a>
  -->
</div>

<footer>© 2024 — CT Portfolio Experiments</footer>

</body>
</html>
